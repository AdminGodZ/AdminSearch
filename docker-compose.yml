x-runtime-hardening: &runtime-hardening
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  searxng-core:
    <<: *runtime-hardening
    image: ${SEARXNG_IMAGE:-docker.io/searxng/searxng:latest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
    mem_limit: 768m
    pids_limit: 256
    ports:
      - "127.0.0.1:8080:8080"
    dns:
      - ${SEARXNG_DNS_1:-45.90.28.0}
      - ${SEARXNG_DNS_2:-45.90.30.0}
    environment:
      SEARXNG_PORT: 8080
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_SECRET: ${SEARXNG_SECRET:?Set SEARXNG_SECRET to a generated random value}
    volumes:
      - ./searxng/core-config:/etc/searxng
      - searxng-cache:/var/cache/searxng
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/', timeout=5).status < 500 else 1)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  valkey:
    <<: *runtime-hardening
    image: ${VALKEY_IMAGE:-docker.io/valkey/valkey:8-alpine}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    mem_limit: 256m
    pids_limit: 128
    command: ["valkey-server", "--save", "30", "1", "--loglevel", "warning"]
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  nextjs:
    <<: *runtime-hardening
    build:
      context: .
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 512m
    pids_limit: 256
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://localhost}
      SEARXNG_INTERNAL_URL: http://searxng-core:8080
      SEARXNG_IMAGE: ${SEARXNG_IMAGE:-docker.io/searxng/searxng:latest}
      SEARXNG_ENGINE_TOKENS: ${SEARXNG_ENGINE_TOKENS:-}
      SEARXNG_UPDATE_CHECK_TTL_MS: ${SEARXNG_UPDATE_CHECK_TTL_MS:-21600000}
      SEARXNG_UPDATE_CHECK_TIMEOUT_MS: ${SEARXNG_UPDATE_CHECK_TIMEOUT_MS:-5000}
      RATE_LIMIT_REDIS_URL: redis://valkey:6379
      SEARCH_RATE_LIMIT_WINDOW_MS: ${SEARCH_RATE_LIMIT_WINDOW_MS:-60000}
      SEARCH_RATE_LIMIT_MAX: ${SEARCH_RATE_LIMIT_MAX:-30}
      AUTOCOMPLETE_RATE_LIMIT_WINDOW_MS: ${AUTOCOMPLETE_RATE_LIMIT_WINDOW_MS:-60000}
      AUTOCOMPLETE_RATE_LIMIT_MAX: ${AUTOCOMPLETE_RATE_LIMIT_MAX:-600}
      RATE_LIMIT_TRUST_PROXY_HEADERS: ${RATE_LIMIT_TRUST_PROXY_HEADERS:-true}
      RATE_LIMIT_TRUSTED_PROXY_HOPS: ${RATE_LIMIT_TRUSTED_PROXY_HOPS:-1}
    expose:
      - "3000"
    depends_on:
      searxng-core:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  caddy:
    <<: *runtime-hardening
    image: docker.io/caddy:2.10.2-alpine
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /run:size=16m,mode=755
    mem_limit: 256m
    pids_limit: 128
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-:80}
    ports:
      - "${PUBLIC_BIND_ADDRESS:-127.0.0.1}:${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      nextjs:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://127.0.0.1/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  caddy-config:
  caddy-data:
  searxng-cache:
  valkey-data:
