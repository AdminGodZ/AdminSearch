x-runtime-hardening: &runtime-hardening
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

services:
  searxng-core:
    <<: *runtime-hardening
    image: docker.io/searxng/searxng@${SEARXNG_IMAGE_DIGEST:?Set SEARXNG_IMAGE_DIGEST to a pinned sha256 digest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /run:size=16m,mode=755
    mem_limit: 768m
    pids_limit: 256
    ports:
      - "127.0.0.1:8080:8080"
    dns:
      - ${SEARXNG_DNS_1:-45.90.28.0}
      - ${SEARXNG_DNS_2:-45.90.30.0}
    environment:
      SEARXNG_PORT: 8080
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_SECRET: ${SEARXNG_SECRET:?Set SEARXNG_SECRET to a generated random value}
    volumes:
      - ./searxng/core-config:/etc/searxng
      - searxng-cache:/var/cache/searxng
    depends_on:
      - valkey

  valkey:
    <<: *runtime-hardening
    image: docker.io/valkey/valkey@${VALKEY_IMAGE_DIGEST:?Set VALKEY_IMAGE_DIGEST to a pinned sha256 digest}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    mem_limit: 256m
    pids_limit: 128
    command: ["valkey-server", "--save", "30", "1", "--loglevel", "warning"]
    volumes:
      - valkey-data:/data

  nextjs:
    <<: *runtime-hardening
    profiles: ["prod"]
    build:
      context: .
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 512m
    pids_limit: 256
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://localhost}
      SEARXNG_INTERNAL_URL: http://searxng-core:8080
      SEARXNG_IMAGE_DIGEST: ${SEARXNG_IMAGE_DIGEST:?Set SEARXNG_IMAGE_DIGEST to a pinned sha256 digest}
      SEARXNG_ENGINE_TOKENS: ${SEARXNG_ENGINE_TOKENS:-}
      SEARXNG_UPDATE_CHECK_TTL_MS: ${SEARXNG_UPDATE_CHECK_TTL_MS:-21600000}
      SEARXNG_UPDATE_CHECK_TIMEOUT_MS: ${SEARXNG_UPDATE_CHECK_TIMEOUT_MS:-5000}
      RATE_LIMIT_REDIS_URL: redis://valkey:6379
      SEARCH_RATE_LIMIT_WINDOW_MS: ${SEARCH_RATE_LIMIT_WINDOW_MS:-60000}
      SEARCH_RATE_LIMIT_MAX: ${SEARCH_RATE_LIMIT_MAX:-30}
      AUTOCOMPLETE_RATE_LIMIT_WINDOW_MS: ${AUTOCOMPLETE_RATE_LIMIT_WINDOW_MS:-60000}
      AUTOCOMPLETE_RATE_LIMIT_MAX: ${AUTOCOMPLETE_RATE_LIMIT_MAX:-600}
      RATE_LIMIT_TRUST_PROXY_HEADERS: ${RATE_LIMIT_TRUST_PROXY_HEADERS:-true}
      RATE_LIMIT_TRUSTED_PROXY_HOPS: ${RATE_LIMIT_TRUSTED_PROXY_HOPS:-1}
    expose:
      - "3000"
    depends_on:
      - searxng-core
      - valkey

  caddy:
    <<: *runtime-hardening
    profiles: ["prod"]
    image: docker.io/caddy:2.10.2-alpine
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
      - /run:size=16m,mode=755
    mem_limit: 256m
    pids_limit: 128
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nextjs

volumes:
  caddy-config:
  caddy-data:
  searxng-cache:
  valkey-data:
