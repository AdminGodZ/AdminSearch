use_default_settings:
  engines:
    keep_only:
      - duckduckgo
      - qwant
      - startpage
      - wikipedia
      - duckduckgo images
      - qwant images
      - startpage images
      - bing images
      - openverse

search:
  formats:
    - html
    - json

server:
  secret_key: "change-this-in-production"
  public_instance: false
  limiter: false
  image_proxy: false

engines:
  - name: duckduckgo
    disabled: false
  - name: qwant
    disabled: false
  - name: startpage
    disabled: false
  - name: wikipedia
    disabled: false
  - name: duckduckgo images
    disabled: false
  - name: qwant images
    disabled: false
  - name: startpage images
    disabled: false
  - name: bing images
    disabled: false
  - name: openverse
    disabled: false
