use_default_settings:
  engines:
    keep_only:
      # Generic search:
      - bing
      - brave
      - duckduckgo
      - google
      - mojeek
      - qwant
      - startpage
      - yahoo
      - ddg definitions
      - wikidata
      - wikipedia
      - wolframalpha
      - yandex
      # Image search:
      - bing images
      - brave.images
      - google images
      - mojeek images
      - qwant images
      - startpage images
      - duckduckgo images
      - yandex images
      # Video alternates:
      - bing videos
      - brave.videos
      - google videos
      - qwant videos
      - duckduckgo videos
      - dailymotion
      - youtube
      # News search:
      - mojeek news
      - startpage news
      - wikinews
      - bing news
      - brave.news
      - duckduckgo news
      - google news
      - qwant news
      - reuters
      - yahoo news

search:
  autocomplete: google
  autocomplete_min: 2
  favicon_resolver: google
  # Alternate supported autocomplete backends:
  # autocomplete: brave
  # autocomplete: duckduckgo
  # autocomplete: bing
  formats:
    - html
    - json

plugins:
  searx.plugins.calculator.SXNGPlugin:
    active: true

  searx.plugins.hash_plugin.SXNGPlugin:
    active: true

  searx.plugins.self_info.SXNGPlugin:
    active: true

  searx.plugins.unit_converter.SXNGPlugin:
    active: true

  searx.plugins.time_zone.SXNGPlugin:
    active: true

  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: false

  searx.plugins.oa_doi_rewrite.SXNGPlugin:
    active: false

server:
  # Required by docker-compose.yml and injected through SEARXNG_SECRET.
  secret_key: ""
  public_instance: false
  limiter: false
  image_proxy: false

engines:
